name: Test

# npm ci requires package-lock.json; do not remove it from the repo.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install engine dependencies
        run: pip install -r requirements.txt
      - name: Engine unit tests
        run: PYTHONPATH=engine python3 -m pytest engine/tests -v --ignore=engine/tests/test_brownfield_integration.py
      - name: Engine demo smoke test
        run: PYTHONPATH=engine python3 engine/cli.py demo carlisle
