\* PacketProtocol.cfg — TLC model-checking configuration
\*
\* Run with: tlc PacketProtocol.tla -config PacketProtocol.cfg
\* Or use the TLA+ Toolbox / VS Code TLA+ extension.

CONSTANTS
    Signers = {s1, s2, s3, s4}
    M = 3
    MaxPackets = 3
    ConflictPairs = {{p1, p2}}

INVARIANT
    TypeInvariant
    QuorumRequired
    NoConflict
    AuditMonotonic

SPECIFICATION
    Spec
