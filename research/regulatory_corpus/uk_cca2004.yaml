statute_id: UK-CCA-2004
title: Civil Contingencies Act 2004
jurisdiction: UK
type: primary_legislation
url: https://www.legislation.gov.uk/ukpga/2004/36/contents

relevant_sections:
  - section: "Part 1, Section 2"
    title: "Duty to assess, plan and advise"
    summary: "Category 1 responders must assess risk of emergencies, maintain plans, and arrange for publication of assessments and plans."
    munin_mapping: "Munin's pre-simulated playbooks and cascade analysis support this duty by providing pre-validated response plans."

  - section: "Part 1, Section 4"
    title: "Advice and assistance to the public"
    summary: "Category 1 responders must maintain arrangements to warn and inform the public."
    munin_mapping: "Munin's incident timeline and cascade prediction provide evidence basis for public warnings."

  - section: "Part 2, Section 19"
    title: "Meaning of emergency"
    summary: "Emergency includes events threatening serious damage to human welfare, environment, or security."
    munin_mapping: "Munin's incident detection aligns with this definition; cascade prediction identifies threats to welfare."

  - section: "Part 2, Section 20"
    title: "Power to make emergency regulations"
    summary: "Her Majesty may make emergency regulations if satisfied an emergency has occurred or is about to occur."
    munin_mapping: "Munin's authorization packets provide evidence basis for emergency regulation decisions."

authorities:
  - name: "Cabinet Office"
    role: "Central coordination, COBR activation"
  - name: "Environment Agency"
    role: "Category 1 responder for flood risk"
  - name: "Local Resilience Forums"
    role: "Multi-agency coordination at local level"
